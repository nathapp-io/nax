version: "3.9"
# Mirrors GitHub Actions CI environment (ubuntu-latest + Bun 1.3.11, glibc).
# Usage: docker compose -f docker-compose.test-bail.yml run --rm ci-test-bail
# Resources: 1 vCPU / 2GB RAM — stress test to surface flakiness early.
services:
  ci-test-bail:
    image: oven/bun:1.3.11
    working_dir: /app
    volumes:
      - .:/app
      # Isolate node_modules so host install doesn't bleed in
      - ci_node_modules:/app/node_modules
    environment:
      - CI=1
      - NAX_SKIP_PRECHECK=1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== CI Test Run (bail) ==="
        date
        apt-get update -qq && apt-get install -y -qq git
        git config --global safe.directory '*'
        git config --global user.name 'CI Runner'
        git config --global user.email 'ci@nathapp.io'
        bun install --frozen-lockfile
        echo "=== typecheck ==="
        bun run typecheck
        echo "=== lint ==="
        bun run lint
        echo "=== test (unit) ==="
        bun test test/unit/ --timeout=60000 --bail
        echo "=== test (integration) ==="
        bun test test/integration/ --timeout=60000 --bail
        echo "=== test (ui) ==="
        bun test test/ui/ --timeout=60000 --bail
        echo "=== DONE ==="

volumes:
  ci_node_modules:
