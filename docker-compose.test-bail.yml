version: "3.9"
# Mirrors GitHub Actions CI environment with constrained resources.
# Usage: docker compose -f docker-compose.test-bail.yml run --rm ci-test-bail
# Resources: 2 vCPU / 2GB RAM — tighter than GitHub runners (7GB) to surface flakiness early.
services:
  ci-test-bail:
    image: nathapp/node-bun:22.21.0-1.3.9-alpine
    working_dir: /app
    volumes:
      - .:/app
      # Isolate node_modules so host install doesn't bleed in
      - ci_node_modules:/app/node_modules
    environment:
      - CI=1
      - NAX_SKIP_PRECHECK=1
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== CI Test Run ==="
        date
        apk add --no-cache git
        git config --global safe.directory '*'
        git config --global user.name 'CI Runner'
        git config --global user.email 'ci@nathapp.io'
        bun install --frozen-lockfile
        echo "=== typecheck ==="
        bun run typecheck
        echo "=== lint ==="
        bun run lint
        echo "=== test ==="
        CI=1 NAX_SKIP_PRECHECK=1 bun test test/ --timeout=60000 --bail
        echo "=== DONE ==="

volumes:
  ci_node_modules:
