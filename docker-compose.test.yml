version: "3.9"
# Mirrors GitHub Actions CI environment (ubuntu-latest + Bun 1.3.11, glibc).
# Usage: docker compose -f docker-compose.test.yml run --rm ci-test
services:
  ci-test:
    image: oven/bun:1.3.11
    working_dir: /app
    volumes:
      - .:/app
      # Isolate node_modules so host install doesn't bleed in
      - ci_node_modules:/app/node_modules
    environment:
      - CI=1
      - NAX_SKIP_PRECHECK=1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== CI Test Run ==="
        date
        apt-get update -qq && apt-get install -y -qq git
        git config --global safe.directory '*'
        git config --global user.name 'CI Runner'
        git config --global user.email 'ci@nathapp.io'
        bun install --frozen-lockfile
        echo "=== typecheck ==="
        bun run typecheck
        echo "=== lint ==="
        bun run lint
        echo "=== test ==="
        bun test --timeout=60000 || true
        echo "=== DONE ==="

volumes:
  ci_node_modules:
