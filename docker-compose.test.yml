version: "3.9"
# Mirrors the GitLab CI test stage exactly.
# Usage: docker compose -f docker-compose.test.yml run --rm ci-test
# Output is written to .ci-test-output.txt in the repo root (mounted volume).
services:
  ci-test:
    # Use official multi-arch Bun image (same Bun version as CI: 1.3.9, Alpine-based)
    # nathapp/node-bun is private/amd64-only; oven/bun is public and supports ARM64 (Mac01)
    image: oven/bun:1.3.9-alpine
    working_dir: /app
    volumes:
      - .:/app
      # Isolate node_modules so host install doesn't bleed in
      - ci_node_modules:/app/node_modules
    environment:
      - CI=1
      - NAX_SKIP_PRECHECK=1
    command: >
      sh -c "
        apk add --no-cache git 2>&1 | tee /app/.ci-test-output.txt &&
        git config --global safe.directory '*' &&
        git config --global user.name 'CI Runner' &&
        git config --global user.email 'ci@nathapp.io' &&
        bun install --frozen-lockfile 2>&1 | tee -a /app/.ci-test-output.txt &&
        bun run typecheck 2>&1 | tee -a /app/.ci-test-output.txt &&
        bun run lint 2>&1 | tee -a /app/.ci-test-output.txt &&
        bun run test 2>&1 | tee -a /app/.ci-test-output.txt;
        echo EXIT_CODE=\$? | tee -a /app/.ci-test-output.txt
      "

volumes:
  ci_node_modules:
