name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-canary.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-publish (e.g. v0.51.0)"
        required: true
        type: string

permissions:
  contents: write # needed for GitHub Release creation
  id-token: write # needed for npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for changelog extraction

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test --timeout=60000
        env:
          NAX_SKIP_PRECHECK: "1"

      # Validate tag matches package.json version
      - name: Validate version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✅ Version match: $TAG"

      # Determine tag and release type
      - name: Set release info
        id: info
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *"-canary."* ]]; then
            echo "npm_tag=canary" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "notify=false" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "notify=true" >> "$GITHUB_OUTPUT"
          fi

      # Publish to npm (trusted publishing via OIDC — no token needed)
      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.info.outputs.npm_tag }} --provenance

      # Extract release notes from CHANGELOG.md
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          # Extract section between ## [$VERSION] and next ## [
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            # Fallback: generate from git log
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.info.outputs.tag }}^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --oneline "$PREV_TAG..${{ steps.info.outputs.tag }}" | head -20)
            else
              NOTES="Release ${{ steps.info.outputs.tag }}"
            fi
          fi

          # Write to file (handles multiline)
          echo "$NOTES" > /tmp/release-notes.md

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.tag }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          generate_release_notes: false

      # Telegram notification (stable only)
      - name: Notify Telegram
        if: steps.info.outputs.notify == 'true' && vars.TELEGRAM_CHAT_ID != ''
        run: |
          NOTES=$(cat /tmp/release-notes.md | head -20)
          MSG="🚀 *nax ${{ steps.info.outputs.tag }} released*

          \`\`\`
          npm install -g @nathapp/nax
          \`\`\`

          ${NOTES}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ vars.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MSG" || true
