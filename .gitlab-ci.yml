# .gitlab-ci.yml - nax CI/CD
# Bun-native, single package (no turbo/monorepo)
#
# Triggers:
#   - MR: test only (gate for merge)
#   - [run-release] on master: test + release + notify
#   - [run-prerelease] on non-master: test + canary release + notify
#   - release-by-bot commits and tags: skipped entirely

stages:
  - test
  - release
  - notify

# --- Stage: Test ---
test:
  stage: test
  image: 
    name: nathapp/node-bun:22.21.0-1.3.9-alpine
  before_script:
    - apk add --no-cache git 
    - git config --global safe.directory '*'
    - git config --global user.name "CI Runner"
    - git config --global user.email "ci@nathapp.io"
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
    policy: pull-push
  script:
    - bun install --frozen-lockfile
    - bun run typecheck
    - bun run lint
    - bun run test
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /release-by-bot/ || $CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_MESSAGE =~ /run-prerelease/ && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_MESSAGE =~ /run-release/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_MESSAGE =~ /run-test/'

# --- Stage: Release ---
release:
  stage: release
  image: 
    name: nathapp/node-bun:22.21.0-1.3.9-alpine
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
    policy: pull
  variables:
    NPM_REGISTRY: "//registry.npmjs.org/"
    NPM_RELEASE_TOKEN: $NPM_TOKEN
  before_script:
    - apk add --no-cache git
    - git config --global safe.directory '*'
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
  script:
    - bun install --frozen-lockfile
    - VERSION=$(bun -e "console.log(require('./package.json').version)")
    - bun run build
    - echo "${NPM_REGISTRY}:_authToken=${NPM_RELEASE_TOKEN}" > .npmrc
    - npm publish --access public
    - git tag -a "v${VERSION}" -m "v${VERSION}"
    - git push "https://${GITLAB_USER_NAME}:${CI_GIT_TOKEN}@${CI_REPOSITORY_URL#*@}" --tags
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /release-by-bot/ || $CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_MESSAGE =~ /run-prerelease/ && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        NPM_REGISTRY: "//npm.nathapp.io/"
        NPM_RELEASE_TOKEN: $NPM_PRIVATE_TOKEN
    - if: '$CI_COMMIT_MESSAGE =~ /run-release/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --- Stage: Notify ---
notify:
  stage: notify
  image: 
    name: registry-intl.cn-hongkong.aliyuncs.com/gkci/node:22.14.0-alpine-ci
  needs: [release]
  script:
    - VERSION=$(node -e "console.log(require('./package.json').version)")
    - 'curl -s -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$TELEGRAM_CHAT_ID\", \"text\": \"nax v${VERSION} released\"}" https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /release-by-bot/ || $CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$TELEGRAM_BOT_TOKEN == null || $TELEGRAM_BOT_TOKEN == ""'
      when: never
    - if: '$CI_COMMIT_MESSAGE =~ /run-prerelease/ && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_MESSAGE =~ /run-release/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --- Notify: MR Pipeline Success ---
notify_mr_success:
  stage: notify
  image: 
    name: registry-intl.cn-hongkong.aliyuncs.com/gkci/node:22.14.0-alpine-ci
  needs: [test]
  script:
    - 'curl -s -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$TELEGRAM_CHAT_ID\", \"text\": \"nax MR !${CI_MERGE_REQUEST_IID} pipeline passed: ${CI_MERGE_REQUEST_TITLE}\"}" https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage'
  rules:
    - if: '$TELEGRAM_BOT_TOKEN == null || $TELEGRAM_BOT_TOKEN == ""'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# --- Notify: Test Pipeline Success ---
notify_test_only:
  stage: notify
  image: 
    name: registry-intl.cn-hongkong.aliyuncs.com/gkci/node:22.14.0-alpine-ci
  needs: [test]
  script:
    - 'curl -s -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$TELEGRAM_CHAT_ID\", \"text\": \"nax test pipeline passed: ${CI_MERGE_REQUEST_TITLE}\"}" https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage'
  rules:
    - if: '$TELEGRAM_BOT_TOKEN == null || $TELEGRAM_BOT_TOKEN == ""'
      when: never
    - if: '$CI_COMMIT_MESSAGE =~ /run-test/' 

# --- Notify: Pipeline Failed ---
notify_pipeline_failed:
  stage: notify
  image: 
    name: registry-intl.cn-hongkong.aliyuncs.com/gkci/node:22.14.0-alpine-ci
  needs: [test]
  when: on_failure
  script:
    - SUBJECT=$(echo "$CI_COMMIT_MESSAGE" | head -1)
    - 'curl -s -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$TELEGRAM_CHAT_ID\", \"text\": \"nax CI FAILED on ${CI_COMMIT_BRANCH:-MR}: ${SUBJECT}\n${CI_PIPELINE_URL}\"}" https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /release-by-bot/ || $CI_COMMIT_TAG'
      when: never
    - if: '$TELEGRAM_BOT_TOKEN == null || $TELEGRAM_BOT_TOKEN == ""'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_failure
    - if: '$CI_COMMIT_MESSAGE =~ /run-prerelease/ && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: on_failure
    - if: '$CI_COMMIT_MESSAGE =~ /run-release/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_failure
    - if: '$CI_COMMIT_MESSAGE =~ /run-test/'
      when: on_failure